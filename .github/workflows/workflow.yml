name: github pages

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: '0'   # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 0.135.0
          extended: true

      - name: Build
        run: hugo --minify

      - name: Validate stylesheet
        run: test -s public/css/main.min.css

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Deploy Fastmail WebDAV
        env:
          RCLONE_CONFIG_FASTMAIL_TYPE: webdav
          RCLONE_CONFIG_FASTMAIL_URL: ${{ secrets.WEBDAV_ADDRESS }}
          RCLONE_CONFIG_FASTMAIL_VENDOR: fastmail
          RCLONE_CONFIG_FASTMAIL_USER: ${{ secrets.WEBDAV_USERNAME }}
          WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
          WEBDAV_PATH: ${{ secrets.WEBDAV_PATH }}
        run: |
          export RCLONE_CONFIG_FASTMAIL_PASS="$(rclone obscure "$WEBDAV_PASSWORD")"
          rclone sync ./public "fastmail:${WEBDAV_PATH}" \
            --checksum \
            --fast-list \
            --transfers=8 \
            --checkers=16 \
            --delete-after \
            --stats=30s

  gh-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: '0'   # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 0.135.0
          extended: true

      - name: Build
        run: hugo -D -E -F
      - name: Deploy Github Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
