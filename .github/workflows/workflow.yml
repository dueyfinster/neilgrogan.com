name: github pages

on:
  push:
    branches:
      - master
  release:
    types:
      - published

jobs:
  build-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: '0'   # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 0.135.0
          extended: true

      - name: Build staging
        run: hugo -D -E -F --minify

      - name: Validate stylesheet
        run: test -n "$(find public/assets/css -type f -name 'stylesheet*.css' -size +0c -print -quit)"

      - name: Upload staging site artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-site
          path: public

  build-production:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: '0'   # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 0.135.0
          extended: true

      - name: Build
        run: hugo --minify

      - name: Validate stylesheet
        run: test -n "$(find public/assets/css -type f -name 'stylesheet*.css' -size +0c -print -quit)"

      - name: Upload production site artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-site
          path: public

  staging:
    runs-on: ubuntu-latest
    needs: build-staging
    steps:
      - name: Download staging site artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-site
          path: public

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Deploy Fastmail staging
        env:
          RCLONE_CONFIG_FASTMAIL_TYPE: webdav
          RCLONE_CONFIG_FASTMAIL_URL: https://myfiles.fastmail.com
          RCLONE_CONFIG_FASTMAIL_VENDOR: fastmail
          RCLONE_CONFIG_FASTMAIL_USER: ${{ secrets.WEBDAV_USERNAME }}
          WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
        run: |
          export RCLONE_CONFIG_FASTMAIL_PASS="$(rclone obscure "$WEBDAV_PASSWORD")"
          rclone sync ./public "fastmail:/staging.neilgrogan.com" \
            --checksum \
            --fast-list \
            --transfers=8 \
            --checkers=16 \
            --delete-after \
            --stats=30s

  production:
    runs-on: ubuntu-latest
    needs: build-production
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Download production site artifact
        uses: actions/download-artifact@v4
        with:
          name: production-site
          path: public

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Deploy Fastmail production
        env:
          RCLONE_CONFIG_FASTMAIL_TYPE: webdav
          RCLONE_CONFIG_FASTMAIL_URL: https://myfiles.fastmail.com
          RCLONE_CONFIG_FASTMAIL_VENDOR: fastmail
          RCLONE_CONFIG_FASTMAIL_USER: ${{ secrets.WEBDAV_USERNAME }}
          WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
        run: |
          export RCLONE_CONFIG_FASTMAIL_PASS="$(rclone obscure "$WEBDAV_PASSWORD")"
          rclone sync ./public "fastmail:/neilgrogan.com" \
            --checksum \
            --fast-list \
            --transfers=8 \
            --checkers=16 \
            --delete-after \
            --stats=30s

  gh-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: '0'   # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 0.135.0
          extended: true

      - name: Build
        run: hugo -D -E -F
      - name: Deploy Github Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
