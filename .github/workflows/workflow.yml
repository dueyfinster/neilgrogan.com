name: github pages

on:
  push:
    branches:
      - master
  release:
    types:
      - published

env:
  RCLONE_INSTALL_VERSION: v1.74.4

jobs:
  build-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: '0'   # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 0.135.0
          extended: true

      - name: Build staging
        run: hugo -D -E -F --minify

      - name: Validate stylesheet
        run: test -n "$(find public/assets/css -type f -name 'stylesheet*.css' -size +0c -print -quit)"

      - name: Upload staging site artifact
        uses: actions/upload-artifact@v7
        with:
          name: staging-site
          path: public

  build-production:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: '0'   # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 0.135.0
          extended: true

      - name: Build
        run: hugo --minify

      - name: Validate stylesheet
        run: test -n "$(find public/assets/css -type f -name 'stylesheet*.css' -size +0c -print -quit)"

      - name: Upload production site artifact
        uses: actions/upload-artifact@v7
        with:
          name: production-site
          path: public

  staging:
    runs-on: ubuntu-latest
    needs: build-staging
    steps:
      - name: Download staging site artifact
        uses: actions/download-artifact@v8
        with:
          name: staging-site
          path: public

      - name: Cache rclone
        id: rclone-cache
        uses: actions/cache@v6
        with:
          path: ~/.local/bin/rclone
          key: rclone-${{ runner.os }}-${{ env.RCLONE_INSTALL_VERSION }}

      - name: Install rclone
        if: steps.rclone-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL "https://downloads.rclone.org/${RCLONE_INSTALL_VERSION}/rclone-${RCLONE_INSTALL_VERSION}-linux-amd64.zip" -o /tmp/rclone.zip
          unzip -q /tmp/rclone.zip -d /tmp
          install -m 755 "/tmp/rclone-${RCLONE_INSTALL_VERSION}-linux-amd64/rclone" ~/.local/bin/rclone

      - name: Add rclone to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check rclone
        run: rclone version

      - name: Deploy Fastmail staging
        env:
          RCLONE_CONFIG_FASTMAIL_TYPE: webdav
          RCLONE_CONFIG_FASTMAIL_URL: https://myfiles.fastmail.com
          RCLONE_CONFIG_FASTMAIL_VENDOR: fastmail
          RCLONE_CONFIG_FASTMAIL_USER: ${{ secrets.WEBDAV_USERNAME }}
          WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
        run: |
          export RCLONE_CONFIG_FASTMAIL_PASS="$(rclone obscure "$WEBDAV_PASSWORD")"
          rclone sync ./public "fastmail:/staging.neilgrogan.com" \
            --checksum \
            --fast-list \
            --transfers=8 \
            --checkers=16 \
            --delete-after \
            --stats=30s

  production:
    runs-on: ubuntu-latest
    needs: build-production
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Download production site artifact
        uses: actions/download-artifact@v8
        with:
          name: production-site
          path: public

      - name: Cache rclone
        id: rclone-cache
        uses: actions/cache@v6
        with:
          path: ~/.local/bin/rclone
          key: rclone-${{ runner.os }}-${{ env.RCLONE_INSTALL_VERSION }}

      - name: Install rclone
        if: steps.rclone-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL "https://downloads.rclone.org/${RCLONE_INSTALL_VERSION}/rclone-${RCLONE_INSTALL_VERSION}-linux-amd64.zip" -o /tmp/rclone.zip
          unzip -q /tmp/rclone.zip -d /tmp
          install -m 755 "/tmp/rclone-${RCLONE_INSTALL_VERSION}-linux-amd64/rclone" ~/.local/bin/rclone

      - name: Add rclone to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check rclone
        run: rclone version

      - name: Deploy Fastmail production
        env:
          RCLONE_CONFIG_FASTMAIL_TYPE: webdav
          RCLONE_CONFIG_FASTMAIL_URL: https://myfiles.fastmail.com
          RCLONE_CONFIG_FASTMAIL_VENDOR: fastmail
          RCLONE_CONFIG_FASTMAIL_USER: ${{ secrets.WEBDAV_USERNAME }}
          WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
        run: |
          export RCLONE_CONFIG_FASTMAIL_PASS="$(rclone obscure "$WEBDAV_PASSWORD")"
          rclone sync ./public "fastmail:/neilgrogan.com" \
            --checksum \
            --fast-list \
            --transfers=8 \
            --checkers=16 \
            --delete-after \
            --stats=30s
